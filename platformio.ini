; Waermepumpen-Gateway - PlatformIO Konfiguration
; Zwei Environments: s3_gateway (ESP32-S3) und wroom_sensor (WROOM-32)
;
; Flashen:
;   pio run -e s3_gateway   --target upload    (ESP32-S3 Gateway)
;   pio run -e wroom_sensor --target upload    (WROOM-32 Sensorboard)
;   pio run -e s3_gateway   --target uploadfs  (LittleFS Dateisystem)

[platformio]
default_envs = s3_gateway

; ESP32-S3 Gateway (Waveshare ESP32-S3-RS485-CAN)
; Quellcode: src/main.cpp
[env:s3_gateway]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    emelianov/modbus-esp8266 @ ^4.1.0

; ESP32-WROOM-32 Sensorboard
; Quellcode: src_wroom/main.cpp
; build_src_filter: alle Dateien aus src/ ausschliessen, src_wroom/ einschliessen
[env:wroom_sensor]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../src_wroom/>
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    milesburton/DallasTemperature @ ^3.11.0
    paulstoffregen/OneWire @ ^2.3.8