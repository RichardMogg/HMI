; Waermepumpen-Gateway - PlatformIO Konfiguration
; Zwei Environments: s3_gateway (ESP32-S3) und wroom_sensor (ESP32-S3-N16R8)
;
; Flashen:
;   pio run -e s3_gateway   --target upload    (ESP32-S3 Gateway)
;   pio run -e wroom_sensor --target upload    (ESP32-S3-N16R8 Sensorboard)
;   pio run -e s3_gateway   --target uploadfs  (LittleFS Dateisystem)

[platformio]
default_envs = s3_gateway

; ESP32-S3 Gateway (Waveshare ESP32-S3-RS485-CAN)
; Quellcode: src/main.cpp
; WICHTIG: board_build.partitions fixiert LittleFS-Adresse - verhindert Dateiverlust bei Updates
; extra_scripts: uploadfs laeuft automatisch nach jedem upload (kein manuelles uploadfs mehr noetig)
[env:s3_gateway]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
extra_scripts = post:scripts/post_upload_fs.py
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    emelianov/modbus-esp8266 @ ^4.1.0

; ESP32-S3-N16R8 Sensorboard (16MB Flash, 8MB OctalSPI-PSRAM)
; Quellcode: src_wroom/main.cpp
; ACHTUNG: GPIO 26-37 intern belegt (OctalSPI Flash/PSRAM) - nicht verwenden!
; build_src_filter: alle Dateien aus src/ ausschliessen, src_wroom/ einschliessen
[env:wroom_sensor]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
build_src_filter = -<*> +<../src_wroom/>
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    milesburton/DallasTemperature @ ^3.11.0
    paulstoffregen/OneWire @ ^2.3.8